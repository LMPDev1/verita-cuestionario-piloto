<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Synap⁹ · Cuestionario Verita</title>
<style>
  :root{
    --neon:#C77DFF; --light:#F3D9FF; --mid:#E5B8FF; --dark:#9B4FD4;
    --ink:#292929; --mist:#606060; --snow:#fff; --fog:#F7F7F9;
    --line:#ECE7F1; --ok-bg:#E9F6EE; --ok-fg:#2F7D52;
    --shadow:0 1px 4px rgba(41,41,41,.06); --soft:0 8px 34px rgba(155,79,212,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--fog); color:var(--ink);
    font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .display{font-family:"Playfair Display",Georgia,serif;font-weight:500;letter-spacing:-.01em}
  #app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:0 20px}

  /* Topbar + progreso */
  header{display:flex;align-items:center;gap:12px;padding:18px 2px 10px;position:sticky;top:0;background:var(--fog);z-index:5}
  .logo{font-family:"Playfair Display",Georgia,serif;font-size:22px}
  .logo b{font-weight:500}.logo .n{color:var(--neon)}
  .bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--mid),var(--neon));width:0;transition:width .35s ease;border-radius:99px}
  .pct{font-size:12px;color:var(--mist);font-variant-numeric:tabular-nums;min-width:34px;text-align:right}

  main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0 24px}
  .step{animation:rise .32s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.step{animation:none}}

  .q{font-size:22px;line-height:1.25;margin-bottom:22px;text-wrap:balance}
  .hint{font-size:13px;color:var(--mist);margin:-14px 0 20px}

  /* Opciones de texto */
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--snow);
    border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;font-size:15px;color:var(--ink);
    cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s}
  .opt:hover{border-color:var(--mid)}
  .opt:focus-visible{outline:2px solid var(--neon);outline-offset:2px}
  .opt.sel{border-color:var(--neon);background:var(--light);box-shadow:var(--soft)}
  .opt .box{width:20px;height:20px;border-radius:6px;border:1.6px solid var(--mid);flex:0 0 auto;display:grid;place-items:center}
  .opt.round .box{border-radius:50%}
  .opt.sel .box{background:var(--neon);border-color:var(--neon)}
  .opt.sel .box::after{content:"";width:9px;height:9px;border-radius:2px;background:#fff}
  .opt.round.sel .box::after{border-radius:50%}

  /* Sí / No */
  .yn{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .yn button{padding:20px;font-size:17px;font-weight:600;border-radius:18px;border:1.5px solid var(--line);
    background:var(--snow);color:var(--ink);cursor:pointer;transition:.15s}
  .yn button:hover{border-color:var(--neon);background:var(--light)}
  .yn button:focus-visible{outline:2px solid var(--neon);outline-offset:2px}

  /* Opciones con imagen */
  .imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .imgs.cols2{grid-template-columns:repeat(2,1fr)}
  .imgopt{background:var(--snow);border:1.5px solid var(--line);border-radius:18px;padding:10px 8px 12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:8px;transition:.15s;text-align:center}
  .imgopt:hover{border-color:var(--mid);transform:translateY(-2px)}
  .imgopt:focus-visible{outline:2px solid var(--neon);outline-offset:2px}
  .imgopt.sel{border-color:var(--neon);background:var(--light);box-shadow:var(--soft)}
  .imgopt img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:50%;background:var(--fog)}
  .imgopt .noimg{width:100%;aspect-ratio:1/1;border-radius:50%;background:var(--fog);display:grid;place-items:center;font-family:"Playfair Display",Georgia,serif;font-size:46px;color:var(--dark);line-height:1}
  .imgopt span{font-size:12.5px;line-height:1.25;color:var(--ink)}

  /* Nav */
  .nav{display:flex;align-items:center;gap:12px;margin-top:26px}
  .back{background:none;border:none;color:var(--mist);font-size:14px;cursor:pointer;padding:8px 4px;display:flex;align-items:center;gap:6px}
  .back:hover{color:var(--ink)}
  .cta{flex:1;padding:16px;border:none;border-radius:99px;background:var(--ink);color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:.2s;letter-spacing:.02em}
  .cta:hover{background:var(--dark)}
  .cta:disabled{opacity:.4;cursor:not-allowed}
  .cta:focus-visible{outline:2px solid var(--neon);outline-offset:2px}

  /* Intro + resultados */
  .center{text-align:center}
  .hero-emoji{font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:var(--dark);font-weight:600;margin-bottom:14px}
  .intro h1{font-size:34px;line-height:1.1;margin-bottom:14px}
  .intro p{color:var(--mist);font-size:15.5px;margin-bottom:10px}
  .meta{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:22px 0 28px}
  .chip{font-size:12.5px;background:var(--snow);border:1px solid var(--line);color:var(--mist);padding:7px 13px;border-radius:99px}

  .result h1{font-size:28px;margin-bottom:6px}
  .result .sub{color:var(--mist);font-size:14px;margin-bottom:24px}
  .card{background:var(--snow);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
  .card.hi{display:flex;gap:16px;align-items:center}
  .card.hi img{width:88px;height:88px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:var(--fog)}
  .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mist);font-weight:600;margin-bottom:5px}
  .val{font-size:20px}.val.display{font-size:22px}
  .rowlist{display:flex;flex-direction:column;gap:10px}
  .row{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding-bottom:10px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none;padding-bottom:0}
  .row dt{color:var(--mist);font-size:14px}.row dd{font-weight:600;font-size:14px;text-align:right}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag{font-size:13px;background:var(--light);color:var(--dark);padding:6px 12px;border-radius:99px;font-weight:500}
  .disc{font-size:13px;color:var(--mist);background:var(--snow);border:1px dashed var(--mid);border-radius:14px;padding:14px 16px;margin:6px 0 20px}
  .disc b{color:var(--ink)}
  footer{padding:16px 0 30px;text-align:center;font-size:12px;color:#a79fb0}
</style>
</head>

   opciones:[{value:'botox',label:'Botox'},{value:'bioestimulacion',label:'Bioestimulación'},{value:'exosomas',label:'Exosomas'},{value:'fillers',label:'Fillers / rellenos'},{value:'laser',label:'Láser'},{value:'peeling',label:'Peeling'},{value:'microneedling',label:'Microneedling'},{value:'radiofrecuencia_hifu',label:'Radiofrecuencia / HIFU'},{value:'ninguno',label:'Ninguno'}]},
  {id:'F2_2',...YN,texto:'¿Fue reciente o está planificado para las próximas 4 semanas?',mostrarSi:f21Proc},

  {id:'H1',tipo:'unica',texto:'¿Cuál es el motivo principal por el que asistes hoy?',
   opciones:[{value:'evaluacion_general',label:'Evaluación general / asesoría'},{value:'manchas_pigmentacion',label:'Manchas / pigmentación'},{value:'patologia',label:'Patología de la piel'},{value:'arrugas',label:'Arrugas'},{value:'flacidez_contorno',label:'Flacidez / contorno'},{value:'rojeces',label:'Rojeces'},{value:'cabello',label:'Cabello'},{value:'textura',label:'Textura de la piel'},{value:'tratamiento_cuello',label:'Tratamiento cuello'},{value:'total_face',label:'Total face / armonización'},{value:'otro',label:'Otro'}]},
  {id:'H2',tipo:'unica',texto:'¿Cómo describirías tu relación con tu rutina de cuidado?',
   opciones:[{value:'minimalista',label:'Minimalista — pocos pasos'},{value:'constante',label:'Constante — rutina básica al día'},{value:'dedicada',label:'Dedicada — varios pasos AM/PM'},{value:'intensiva_pro',label:'Intensiva — disfruto probar activos'}]},
  {id:'H3',tipo:'multiple',texto:'¿Algo más que te gustaría priorizar?',
   opciones:[{value:'manchas',label:'Manchas'},{value:'arrugas',label:'Arrugas'},{value:'flacidez',label:'Flacidez'},{value:'imperfecciones',label:'Imperfecciones'},{value:'rojeces',label:'Rojeces'},{value:'sequedad',label:'Sequedad'},{value:'sensibilidad',label:'Sensibilidad'},{value:'ninguna',label:'Nada en particular'}]},

  {id:'I1',tipo:'multiple',texto:'¿Cuáles de estos aplican a tu día a día?',
   opciones:[{value:'alta_exposicion_solar',label:'Alta exposición solar'},{value:'muchas_horas_pantalla',label:'Muchas horas de pantalla'},{value:'tabaco',label:'Tabaco'},{value:'estres',label:'Estrés'},{value:'mal_sueno',label:'Sueño insuficiente'},{value:'ninguna',label:'Ninguna de las anteriores'}]},

  {id:'J1',tipo:'multiple',texto:'¿Alguna de estas situaciones te describe actualmente?',
   opciones:[{value:'embarazo',label:'Embarazo'},{value:'lactancia',label:'Lactancia'},{value:'anticonceptivos_hormonales',label:'Anticonceptivos hormonales'},{value:'perimenopausia',label:'Perimenopausia'},{value:'menopausia',label:'Menopausia'},{value:'sop',label:'Ovario poliquístico'},{value:'no_aplica',label:'No aplica / prefiero no responder'}]},

  {id:'K1',tipo:'unica',texto:'¿Cuál describe mejor el tono natural de tu piel?',
   opciones:[{value:'muy_claro',label:'Muy claro',img:'fototipo-1'},{value:'claro',label:'Claro',img:'fototipo-2'},{value:'medio',label:'Medio',img:'fototipo-3'},{value:'oliva',label:'Oliva',img:'fototipo-4'},{value:'moreno',label:'Moreno',img:'fototipo-5'},{value:'muy_oscuro',label:'Muy oscuro',img:'fototipo-6'}]},
];

/* ── Estado ────────────────────────────────────────────────────────────── */
const r={};           // respuestas
let orden=[];         // ids respondidos, para "atrás"
let vista='intro';    // intro | pregunta | resultado
let pasoActual=null;  // id del paso mostrado — NO recalcular con siguiente() al togglear

const aplica=p=>!p.mostrarSi||p.mostrarSi(r);
const visibles=()=>PASOS.filter(aplica);
const siguiente=()=>PASOS.find(p=>aplica(p)&&r[p.id]===undefined)||null;

const app=document.getElementById('app');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render(){
  if(vista==='intro')return renderIntro();
  if(vista==='resultado')return renderResultado();
  const p=PASOS.find(x=>x.id===pasoActual);
  if(!p){avanzar();return;}
  renderPregunta(p);
}

function topbar(){
  const vis=visibles(),done=vis.filter(p=>r[p.id]!==undefined).length;
  const pct=Math.round(done/(vis.length||1)*100);
  return `<header><span class="logo"><b>Synap</b><span class="n">⁹</span></span>
    <div class="bar"><i style="width:${pct}%"></i></div><span class="pct">${pct}%</span></header>`;
}

function renderIntro(){
  app.innerHTML=`${topbar()}
    <main><div class="step intro center">
      <p class="hero-emoji">Pre-evaluación</p>
      <h1 class="display">Cuéntanos sobre tu piel</h1>
      <p>Un cuestionario breve para que tu especialista prepare tu evaluación. No hay respuestas correctas — responde según cómo sientes tu piel.</p>
      <div class="meta"><span class="chip">⏱ ~3 minutos</span><span class="chip">🔒 Privado</span><span class="chip">✨ Con apoyo visual</span></div>
      <button class="cta" onclick="empezar()">Comenzar</button>
    </div></main>
    <footer>Resultado preliminar sujeto a revisión profesional · Verita ${esc(VERSION)}</footer>`;
}
function empezar(){const n=siguiente();pasoActual=n?n.id:null;vista=n?'pregunta':'resultado';render();window.scrollTo(0,0);}

function renderPregunta(p){
  const conImg=p.opciones&&p.opciones.some(o=>o.img);
  const multi=p.tipo==='multiple';           // multi-select: toca varias + "Continuar"
  const cur=Array.isArray(r[p.id])?r[p.id]:[];
  const marcado=o=>multi?cur.includes(o.value):r[p.id]===o.value;
  const handler=o=>multi?`toggle('${p.id}','${o.value}')`:`responder('${p.id}','${o.value}')`;
  let body='';
  if(p.tipo==='si_no'){
    body=`<div class="yn"><button onclick="responder('${p.id}',true)">Sí</button>`
      +`<button onclick="responder('${p.id}',false)">No</button></div>`;
  }else if(conImg){
    const cols=p.opciones.length<=4?' cols2':'';
    body=`<div class="imgs${cols}">`+p.opciones.map(o=>{
      const im=o.img?`<img src="${img(o.img)}" alt="">`:`<div class="noimg" aria-hidden="true">?</div>`;
      return `<button class="imgopt${marcado(o)?' sel':''}" data-q="${p.id}" data-v="${o.value}" onclick="${handler(o)}">${im}<span>${esc(o.label)}</span></button>`;
    }).join('')+`</div>`;
  }else{
    body=`<div class="opts">`+p.opciones.map(o=>{
      const cls=multi?'opt':'opt round';
      return `<button class="${cls}${marcado(o)?' sel':''}" data-q="${p.id}" data-v="${o.value}" onclick="${handler(o)}"><span class="box"></span>${esc(o.label)}</button>`;
    }).join('')+`</div>`;
  }
  const hint=multi?`<p class="hint">Puedes elegir varias — toca todas las que apliquen.</p>`:'';
  const nav=multi
    ? `<div class="nav"><button class="back" onclick="atras()">← Atrás</button><button class="cta" onclick="continuarMultiple('${p.id}')">Continuar</button></div>`
    : `<div class="nav"><button class="back" onclick="atras()">← Atrás</button></div>`;
  app.innerHTML=`${topbar()}<main><div class="step"><h2 class="q display">${esc(p.texto)}</h2>${hint}${body}${nav}</div></main>`;
}

function responder(id,val){r[id]=val;if(!orden.includes(id))orden.push(id);avanzar();}
function toggle(id,val){
  const cur=Array.isArray(r[id])?r[id]:[];
  const on=!cur.includes(val);
  r[id]=on?[...cur,val]:cur.filter(v=>v!==val);
  // Actualiza SOLO el botón tocado (sin re-render → sin parpadeo, no recarga imágenes).
  const btn=document.querySelector(`[data-q="${id}"][data-v="${val}"]`);
  if(btn)btn.classList.toggle('sel',on);
}
function continuarMultiple(id){
  if(!Array.isArray(r[id]))r[id]=[];
  if(!orden.includes(id))orden.push(id);
  avanzar();
}
function avanzar(){const n=siguiente();pasoActual=n?n.id:null;vista=n?'pregunta':'resultado';render();window.scrollTo(0,0);}
function atras(){
  const last=orden.pop();
  if(last===undefined){vista='intro';return render();}
  delete r[last];
  // borra respuestas que dejaron de aplicar
  Object.keys(r).forEach(k=>{const p=PASOS.find(x=>x.id===k);if(p&&!aplica(p))delete r[k];});
  pasoActual=last;vista='pregunta';render();window.scrollTo(0,0);
}

/* ── Clasificación (espejo de verita.js#clasificar, subconjunto visible) ── */
function clasificar(){
  const secaClara=esSecaClara(r),tendencia=scoreSeca(r)===2;
  const muySeca=secaClara&&['G1','G2','G3'].filter(i=>r[i]===true).length>=2;
  let tipo='normal',subtipo=null;
  if(muySeca)tipo='muy_seca';else if(secaClara)tipo='seca';else if(tendencia)tipo='tendencia_seca';
  else if(['B1','B2','B3'].filter(i=>r[i]===true).length>=2||r.B1===true||r.B3===true){tipo='grasa';subtipo=r.B4===true?'grasa_global':'mixta';}
  const muyGrasa=r.B1===true&&r.B2===true&&r.B5==='flujo_constante';
  let sens='no_sensible';
  if(r.C1===true)sens='sensible';else if(r.C2===true||r.C3===true)sens='sensible_leve';
  return{tipo,subtipo,muySeca,muyGrasa,sens,
    manchas:r.E1===true,ojeras:r.E2_1===true,
    arrugas:r.F1,flacidez:Array.isArray(r.F2)?r.F2.filter(v=>v!=='no_lo_noto'):[],
    imperfecciones:d1Detalle(r),motivo:r.H1,perfil:r.H2,fototipo:r.E4,tono:r.K1};
}

const LAB_TIPO={muy_seca:'Piel muy seca',seca:'Piel seca',tendencia_seca:'Tendencia seca',normal:'Piel equilibrada'};
const LAB_SENS={sensible:'Sensible',sensible_leve:'Levemente sensible',no_sensible:'Poco reactiva'};
const LAB_MOTIVO={evaluacion_general:'Evaluación general',manchas_pigmentacion:'Manchas / pigmentación',patologia:'Patología de la piel',arrugas:'Arrugas',flacidez_contorno:'Flacidez / contorno',rojeces:'Rojeces',cabello:'Cabello',textura:'Textura de la piel',tratamiento_cuello:'Tratamiento cuello',total_face:'Total face',otro:'Otro'};
const LAB_PERFIL={minimalista:'Minimalista',constante:'Constante',dedicada:'Dedicada',intensiva_pro:'Intensiva'};

function tipoTexto(c){
  if(c.tipo==='grasa')return c.subtipo==='grasa_global'?'Piel grasa':'Piel mixta';
  return LAB_TIPO[c.tipo]||'Piel equilibrada';
}
function tipoImg(c){
  if(c.tipo==='grasa')return c.subtipo==='grasa_global'?'piel-grasa':'piel-mixta';
  if(['seca','muy_seca','tendencia_seca'].includes(c.tipo))return 'piel-seca';
  return c.sens!=='no_sensible'?'piel-sensible':'piel-mixta';
}
function focos(c){
  const f=[];
  if(c.manchas)f.push('Manchas');
  if(c.imperfecciones)f.push('Imperfecciones');
  if(c.arrugas==='visibles_reposo'||c.arrugas==='marcadas_profundas')f.push('Arrugas');
  if(c.flacidez.length)f.push('Firmeza');
  if(c.muySeca||c.tipo==='seca')f.push('Hidratación / barrera');
  if(c.sens!=='no_sensible')f.push('Sensibilidad');
  if(c.ojeras)f.push('Contorno de ojos');
  return f.length?f:['Mantención y prevención'];
}

function renderResultado(){
  const c=clasificar();
  app.innerHTML=`${topbar().replace(/width:\d+%/,'width:100%').replace(/>\d+%</,'>100%<')}
    <main><div class="step result">
      <p class="hero-emoji">Tu resumen</p>
      <h1 class="display">Esto es lo que entendimos de tu piel</h1>
      <p class="sub">Un resumen preliminar según tus respuestas.</p>

      <div class="card hi">
        <img src="${img(tipoImg(c))}" alt="">
        <div><p class="lab">Tu tipo de piel</p><p class="val display">${tipoTexto(c)}</p>
        <p style="color:var(--mist);font-size:13px;margin-top:4px">${LAB_SENS[c.sens]} · ${c.fototipo?('Fototipo '+c.fototipo):'—'}</p></div>
      </div>

      <div class="card">
        <p class="lab">Temas para conversar con tu especialista</p>
        <div class="tags">${focos(c).map(f=>`<span class="tag">${esc(f)}</span>`).join('')}</div>
      </div>

      <div class="card">
        <dl class="rowlist">
          <div class="row"><dt>Tu motivo de visita</dt><dd>${esc(LAB_MOTIVO[c.motivo]||'—')}</dd></div>
          <div class="row"><dt>Barrera / sensibilidad</dt><dd>${LAB_SENS[c.sens]}</dd></div>
          ${c.perfil?`<div class="row"><dt>Perfil de rutina</dt><dd>${LAB_PERFIL[c.perfil]}</dd></div>`:''}
        </dl>
      </div>

      <div class="disc"><b>Este es un resultado preliminar.</b> No reemplaza el diagnóstico de tu especialista, que revisará tus respuestas y definirá tu plan personalizado.</div>

      <button class="cta" onclick="reiniciar()">Empezar de nuevo</button>
    </div></main>
    <footer>Synap⁹ Verita ${esc(VERSION)} · versión portable de demostración</footer>`;
  window.scrollTo(0,0);
}
function reiniciar(){Object.keys(r).forEach(k=>delete r[k]);orden=[];pasoActual=null;vista='intro';render();}

render();
</script>
